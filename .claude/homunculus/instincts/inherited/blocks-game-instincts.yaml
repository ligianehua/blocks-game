# Blocks Game Workflow Add New Feature Module

## Action

Follow the add-new-feature-module workflow:
1. Create or update logic in src/game/ or src/core/ (e.g., new mode, achievement, leaderboard, stats, etc.)
2. Update src/main.js to integrate the new feature into the app flow
3. Update or create UI components in src/ui/ as needed (e.g., theme.js, toast.js, tutorial.js, share.js)
4. Update localization files src/locales/en.json and src/locales/zh.json for new UI strings
5. Update or create styles in src/styles/ (base.css, components.css, themes.css) if the feature affects appearance
6. Add or update unit tests in tests/unit/ for the new logic
7. Update index.html if the feature affects the main structure or metadata

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/game/*.js, src/core/*.js, src/ui/*.js

